version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: scenesbeats_db
    restart: always
    environment:
      MYSQL_DATABASE: scenesbeats
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: scenesbeats
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql

  api-laravel:
    build:
      context: ./laravel-api
      dockerfile: Dockerfile.prod
    container_name: scenesbeats_laravel
    restart: always
    volumes:
      - ./laravel-api:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: scenesbeats
      DB_USERNAME: scenesbeats
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      APP_URL: http://204.168.248.102/laravel-api
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      - db

  api-node:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: scenesbeats_node
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      SPOTIFY_REDIRECT_URI: http://204.168.248.102/api/auth/spotify/callback
      FRONTEND_URL: http://204.168.248.102
    env_file:
      - ./server/.env.production
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_NODE_API_URL: http://204.168.248.102
        VITE_LARAVEL_API_URL: http://204.168.248.102/laravel-api
    container_name: scenesbeats_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./laravel-api:/var/www/html:ro
    depends_on:
      - api-laravel
      - api-node

volumes:
  db_data:
